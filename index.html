<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Abra Sales CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-mark">AL</div>
        <div>
          <div class="auth-brand-title">Abra Logistics</div>
          <div class="auth-brand-sub">Sales CRM</div>
        </div>
      </div>

      <h1 class="auth-heading">Sign in</h1>
      <p class="auth-subheading">Access is limited to accounts added by your Super Admin.</p>

      <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="loginEmail" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn" class="btn btn-brand w-100">Sign In</button>
      </form>

      <div class="text-center mt-3">
        <a href="forgot-password.html" class="auth-link">Forgot password?</a>
      </div>
    </div>
    <p class="auth-footnote">Not seeing your account? Contact your Super Admin to be added.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Critical error handler for Firebase initialization failures
    (function() {
      // Check if Firebase initialized correctly
      if (typeof firebase === 'undefined') {
        document.body.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif;"><h2>Firebase Initialization Error</h2><p>Unable to load Firebase SDK. Please refresh the page or contact support.</p></div>';
        return;
      }
      
      // Check for services
      if (!window.isAuthAvailable || !window.isAuthAvailable()) {
        document.body.innerHTML = '<div style="padding: 40px; text-align: center; font-family: sans-serif;"><h2>Authentication Service Error</h2><p>Authentication service is temporarily unavailable. Please refresh the page.</p></div>';
        return;
      }
      
      console.log('Firebase initialized successfully');
    })();
  </script>
</body>
</html>
