<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Abra Sales CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-mark">AL</div>
        <div>
          <div class="auth-brand-title">Abra Logistics</div>
          <div class="auth-brand-sub">Sales CRM</div>
        </div>
      </div>

      <h1 class="auth-heading">Reset password</h1>
      <p class="auth-subheading">Enter the email your Super Admin registered for you. We'll send a reset link if it matches a CRM account.</p>

      <div id="resetError" class="alert alert-danger d-none" role="alert"></div>
      <div id="resetSuccess" class="alert alert-success d-none" role="alert">
        <i class="bi bi-check-circle me-1"></i> Reset link sent. Check your inbox (and spam folder).
      </div>

      <form id="resetForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="resetEmail" required autocomplete="username">
        </div>
        <button type="submit" id="resetBtn" class="btn btn-brand w-100">Send Reset Link</button>
      </form>

      <div class="text-center mt-3">
        <a href="index.html" class="auth-link">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
